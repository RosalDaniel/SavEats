<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SaveAts</title>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Afacad', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: url('./images/background.png') center/cover no-repeat;
            min-height: 100vh;
            position: relative;
        }

        /* Header Styles */
        .header {
            background: transparent;
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            top: 0;
        }

        .nav-container {
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #347928;
            font-weight: 500;
            padding: 0.3rem 1rem;
            border: 2px solid #347928;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 121, 40, 0.2);
        }

        .back-arrow {
            font-size: 1rem;
        }

        /* Main Content */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 2rem;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .saveats-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-image {
            height: 60px;
            width: auto;
            max-width: 200px;
            object-fit: contain;
            border-radius: 8px;
        }

        .welcome-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #347928;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 500;
            color: #2d5a3d;
            font-size: 0.95rem;
        }

        .form-input {
            padding: 1rem 1.25rem;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .form-input:focus {
            outline: none;
            background: white;
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.5rem 0;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            accent-color: #347928;
        }

        .checkbox-label {
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
        }

        .forgot-password {
            color: #F0BE49;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #e6a935;
            text-decoration: underline;
        }

        .login-btn {
            background: linear-gradient(135deg, #347928, #4a7c59);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 121, 40, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.95rem;
        }

        .register-link a {
            color: #F0BE49;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #e6a935;
            text-decoration: underline;
        }

        /* Loading state */
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error states */
        .form-input.error {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-group.has-error .error-message {
            display: block;
        }

        /* Success message */
        .success-message {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 1rem;
            }

            .main-content {
                padding: 1rem;
                min-height: calc(100vh - 70px);
            }

            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem 0;
            }

            .welcome-text {
                font-size: 1.5rem;
            }

            .logo-image {
                height: 50px;
                max-width: 160px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 0;
            }

            .login-container {
                padding: 1.5rem 1rem;
                border-radius: 20px;
            }

            .welcome-text {
                font-size: 1.3rem;
            }

            .logo-image {
                height: 40px;
                max-width: 140px;
            }

            .back-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus visible for keyboard navigation */
        .form-input:focus-visible,
        .login-btn:focus-visible,
        .back-btn:focus-visible {
            outline: 2px solid #347928;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <a href="saveats_homepage.html" class="back-btn" id="backToLanding">
                <span class="back-arrow">←</span>
                Back to Landing
            </a>
        </div>
    </header>

    <main class="main-content">
        <div class="login-container">
            <div class="login-header">
                <div class="saveats-logo">
                    <img src="./images/SavEats-Logo.png" alt="SaveAts Logo" class="logo-image">
                </div>
                <h1 class="welcome-text">WELCOME BACK!</h1>
            </div>

            <div class="success-message" id="successMessage">
                Welcome back! Redirecting to your dashboard...
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username" class="form-label">Username or Email</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter Username or Email"
                        required
                        autocomplete="username"
                        aria-describedby="username-error"
                    >
                    <div class="error-message" id="username-error" role="alert"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter Password"
                        required
                        autocomplete="current-password"
                        aria-describedby="password-error"
                    >
                    <div class="error-message" id="password-error" role="alert"></div>
                </div>

                <div class="form-options">
                    <div class="checkbox-container">
                        <input type="checkbox" id="remember" name="remember" class="checkbox">
                        <label for="remember" class="checkbox-label">Remember Me</label>
                    </div>
                    <a href="#" class="forgot-password" id="forgotPassword">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="register-link">
                Don't have an account yet? <a href="registration.html" id="registerLink">Register Here</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const successMessage = document.getElementById('successMessage');

            // Form validation
            function validateField(input, errorId, message) {
                const errorElement = document.getElementById(errorId);
                const formGroup = input.closest('.form-group');
                
                if (!input.value.trim()) {
                    input.classList.add('error');
                    formGroup.classList.add('has-error');
                    errorElement.textContent = message;
                    return false;
                } else {
                    input.classList.remove('error');
                    formGroup.classList.remove('has-error');
                    errorElement.textContent = '';
                    return true;
                }
            }

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function validateForm() {
                const isUsernameValid = validateField(
                    usernameInput, 
                    'username-error', 
                    'Username or email is required'
                );

                const isPasswordValid = validateField(
                    passwordInput, 
                    'password-error', 
                    'Password is required'
                );

                // Additional email validation if input contains @ symbol
                if (usernameInput.value.includes('@') && !validateEmail(usernameInput.value)) {
                    usernameInput.classList.add('error');
                    usernameInput.closest('.form-group').classList.add('has-error');
                    document.getElementById('username-error').textContent = 'Please enter a valid email address';
                    return false;
                }

                return isUsernameValid && isPasswordValid;
            }

            // Real-time validation
            usernameInput.addEventListener('blur', function() {
                if (this.value.trim()) {
                    if (this.value.includes('@') && !validateEmail(this.value)) {
                        validateField(this, 'username-error', 'Please enter a valid email address');
                    } else {
                        this.classList.remove('error');
                        this.closest('.form-group').classList.remove('has-error');
                        document.getElementById('username-error').textContent = '';
                    }
                }
            });

            passwordInput.addEventListener('blur', function() {
                if (this.value.trim()) {
                    this.classList.remove('error');
                    this.closest('.form-group').classList.remove('has-error');
                    document.getElementById('password-error').textContent = '';
                }
            });

            // Form submission
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!validateForm()) {
                    return;
                }

                // Show loading state
                loginBtn.classList.add('loading');
                loginBtn.textContent = '';

                // Simulate API call
                setTimeout(() => {
                    // Hide loading state
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = 'Login';

                    // Show success message
                    successMessage.classList.add('show');

                    // Simulate redirect after success
                    setTimeout(() => {
                        // In a real app, this would redirect to the dashboard
                        alert('Login successful! Redirecting to dashboard...');
                        // window.location.href = '/dashboard';
                    }, 1500);
                }, 2000);
            });

            // Link handlers
            document.getElementById('backToLanding').addEventListener('click', function(e) {
                e.preventDefault();
                // In a real app, this would navigate to the landing page
                alert('Navigating to landing page...');
                // window.location.href = '/';
            });

            document.getElementById('registerLink').addEventListener('click', function(e) {
                e.preventDefault();
                // In a real app, this would navigate to the registration page
                alert('Navigating to registration page...');
                // window.location.href = '/register';
            });

            document.getElementById('forgotPassword').addEventListener('click', function(e) {
                e.preventDefault();
                // In a real app, this would navigate to the forgot password page
                alert('Navigating to forgot password page...');
                // window.location.href = '/forgot-password';
            });

            // Keyboard accessibility
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.matches('.form-input')) {
                    const inputs = Array.from(document.querySelectorAll('.form-input'));
                    const currentIndex = inputs.indexOf(e.target);
                    
                    if (currentIndex < inputs.length - 1) {
                        inputs[currentIndex + 1].focus();
                    } else {
                        loginForm.dispatchEvent(new Event('submit'));
                    }
                }
            });

            // Auto-focus first input
            usernameInput.focus();
        });
    </script>
</body>
</html>
